name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-flasher
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22            # matches the project's pinned toolchain

      - uses: gradle/actions/setup-gradle@v4

      - name: Run checks
        run: ./gradlew check
        env:
          CHROME_BIN: google-chrome-stable   # Karma/Chrome browser tests

      - name: Build production distribution
        run: ./gradlew jsBrowserDistribution

      - name: Deploy to Hugo site
        run: |
          git clone --depth 1 \
            https://x-access-token:${{ secrets.BREISCHL_DEV_REPO_ACCESS_TOKEN }}@github.com/breischl/breischl.github.io.git \
            hugo-site
          DEST=hugo-site/static/apps/flasher
          rm -rf "$DEST"                       # drop stale files (e.g. renamed decks)
          mkdir -p "$DEST"
          cp -r build/dist/js/productionExecutable/. "$DEST"/
          cd hugo-site
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/apps/flasher
          git diff --staged --quiet || \
            git commit -m "Update Flasher app (${GITHUB_SHA::7})" && git push
